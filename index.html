<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auditorium Seating Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Lok Sabha Seating Arrangement</h1>

<div class="container">
<div class="legend">
    <div><span style="width:15px;height:15px;background:#e74c3c;display:inline-block"></span> Ruling</div>
    <div><span style="width:15px;height:15px;background:#3498db;display:inline-block"></span> Opposition</div>
    <div><span style="width:15px;height:15px;background:#2ecc71;display:inline-block"></span> Individual</div>
</div>
    <!-- SEATING LAYOUT -->
    <div id="layout"></div>

    <!-- SIDE PANEL -->
    <div class="panel">
        <h2>Assign Seat</h2>

        <input type="text" id="name" placeholder="Delegate Name">

        <select id="category">
            <option value="Ruling">Ruling</option>
            <option value="Opposition">Opposition</option>
            <option value="Individual">Individual</option>
        </select>

        <input type="text" id="seatCode" placeholder="Seat Code" readonly>

        <button onclick="assignSeat()">Assign Seat</button>
        <button onclick="saveData()">Save</button>
        <button onclick="removeSeat()">Remove Seat</button>

        <h2>Seat Table</h2>
        <table id="table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Seat</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<h2 class="stage">STAGE</h2>

<script type="module">
    import { assignSeat, removeSeat } from "./script.js";

    window.assignSeat = assignSeat;
    window.removeSeat = removeSeat;
</script>
</body>
</html>
